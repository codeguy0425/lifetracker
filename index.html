    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokéTracker | Trainer Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        .pokemon-font { font-family: 'Press+Start+2P', cursive; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-ring { 0% { transform: scale(.33); opacity: 1; } 80%, 100% { opacity: 0; } }
        .loading-ring::before {
            content: ''; position: absolute; left: -8px; top: -8px; width: calc(100% + 16px); height: calc(100% + 16px);
            border: 4px solid #ffcb05; border-radius: 1.5rem; animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .pokeball-bg {
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, #ffffff 10%, #333 11%, #333 15%, transparent 16%),
                        linear-gradient(to bottom, #ee1515 0%, #ee1515 48%, #333 48%, #333 52%, #ffffff 52%, #ffffff 100%);
        }
    </style>
</head>
<body class="bg-[#f0f0f0] text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const apiKey = ""; // Provided by environment

        function App() {
            const [view, setView] = useState('tracker'); 
            const [logs, setLogs] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('lifetracker_db') || '[]');
                } catch(e) { return []; }
            });
            const [prompt, setPrompt] = useState("");
            const [isBuilding, setIsBuilding] = useState(false);
            const [pushStatus, setPushStatus] = useState('idle');
            const [testStatus, setTestStatus] = useState(null);
            const [commits, setCommits] = useState([]);
            const [debugInfo, setDebugInfo] = useState(""); 
            
            const [ghToken, setGhToken] = useState(localStorage.getItem('gh_token') || "");
            const repo = "lifetracker";
            const owner = "codeguy0425";
            const filePath = "index.html"; 

            useEffect(() => {
                localStorage.setItem('lifetracker_db', JSON.stringify(logs));
            }, [logs]);

            const fetchCommits = useCallback(async () => {
                if (!ghToken) return;
                try {
                    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/commits?per_page=8`, {
                        headers: { 
                            "Authorization": `token ${ghToken}`,
                            "Accept": "application/vnd.github.v3+json"
                        }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        setCommits(data);
                    }
                } catch (e) { 
                    console.error("Commit fetch error:", e); 
                }
            }, [ghToken, owner, repo]);

            const testConnection = async () => {
                if (!ghToken) {
                    setTestStatus("❌ Missing Token");
                    return;
                }
                setTestStatus("Testing...");
                try {
                    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {
                        headers: { "Authorization": `token ${ghToken}` }
                    });
                    if (res.ok) {
                        setTestStatus("✅ Connection Success");
                        fetchCommits();
                    } else {
                        const err = await res.json();
                        setTestStatus(`❌ Error: ${err.message}`);
                    }
                } catch (e) {
                    setTestStatus("❌ Connection Failed");
                }
            };

            useEffect(() => { 
                if (view === 'admin') {
                    testConnection();
                    fetchCommits();
                }
            }, [view, fetchCommits]);

            const handleAIUpdate = async () => {
                if (!ghToken) return alert("Please configure GitHub Token in settings.");
                setIsBuilding(true);
                setPushStatus('idle');
                setDebugInfo("AI thinking...");

                try {
                    const currentCode = document.documentElement.outerHTML;
                    const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    
                    const aiResponse = await fetch(geminiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ 
                                parts: [{ 
                                    text: `You are a web developer. Your task is to update the 'Life Tracker' features of this app based on the user prompt: "${prompt}". 
                                    CRITICAL INSTRUCTION: You MUST preserve the 'Builder/Sync' logic. Do NOT modify the handleAIUpdate function, the GitHub API calls, or the Admin/Settings view code. Only update the 'tracker' view and its features. 
                                    Return the full HTML. \n\n ${currentCode}` 
                                }] 
                            }]
                        })
                    });

                    const aiData = await aiResponse.json();
                    let updatedHtml = aiData.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!updatedHtml) throw new Error("AI returned empty content");
                    
                    updatedHtml = updatedHtml.replace(/^```html\n?/, '').replace(/\n?```$/, '').trim();

                    setDebugInfo("Getting file metadata...");
                    const githubUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`;
                    const fileMeta = await fetch(githubUrl, { headers: { Authorization: `token ${ghToken}` } });
                    
                    if (!fileMeta.ok) {
                        const err = await fileMeta.json();
                        throw new Error(`File lookup failed: ${err.message}`);
                    }
                    const metaData = await fileMeta.json();

                    setDebugInfo("Committing to repository...");
                    const commitResponse = await fetch(githubUrl, {
                        method: 'PUT',
                        headers: { "Authorization": `token ${ghToken}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            message: `🤖 AI Evolution: ${prompt.slice(0, 40)}`,
                            content: btoa(unescape(encodeURIComponent(updatedHtml))),
                            sha: metaData.sha
                        })
                    });

                    if (commitResponse.ok) {
                        setPushStatus('success');
                        setDebugInfo("Commit successful! Refreshing...");
                        await fetchCommits(); 
                        setTimeout(() => window.location.reload(), 1500);
                    } else {
                        const err = await commitResponse.json();
                        throw new Error(err.message || "Push rejected");
                    }
                } catch (err) { 
                    setPushStatus('error');
                    setDebugInfo(`Error: ${err.message}`);
                } finally { 
                    setIsBuilding(false); 
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col p-5 bg-[#ffcb05]/10">
                    <nav className="flex justify-between items-center mb-8 border-b-4 border-red-600 pb-4">
                        <div onClick={() => setView('tracker')} className="cursor-pointer group">
                            <h1 className="text-2xl font-black italic tracking-tighter text-blue-700 group-active:text-red-600 transition-colors flex items-center gap-2">
                                <div className="w-6 h-6 rounded-full pokeball-bg border border-black"></div>
                                POKÉ<span className="text-red-600">TRACKER</span>
                            </h1>
                            <p className="text-[9px] font-bold text-blue-500 uppercase tracking-widest leading-none">Trainer OS v2.0</p>
                        </div>
                        <button onClick={() => setView(v => v === 'tracker' ? 'admin' : 'tracker')} className="w-12 h-12 flex items-center justify-center rounded-full bg-white border-4 border-red-600 shadow-md active:scale-90 transition-all text-xl">
                            {view === 'tracker' ? '🎒' : '🏠'}
                        </button>
                    </nav>

                    {view === 'tracker' ? (
                        <div className="space-y-6 flex-1 animate-in slide-in-from-right-4 duration-300">
                            {/* POKEDEX BUILDER INTERFACE */}
                            <div className={`p-6 rounded-3xl border-4 transition-all duration-500 ${isBuilding ? 'bg-red-50 border-blue-400' : 'bg-red-600 border-red-800 shadow-xl'} relative`}>
                                {isBuilding && <div className="absolute inset-0 loading-ring rounded-3xl" />}
                                <div className="flex items-center gap-2 mb-4">
                                    <div className="w-4 h-4 rounded-full bg-blue-400 border-2 border-white animate-pulse"></div>
                                    <h3 className={`text-[10px] font-black uppercase tracking-widest ${isBuilding ? 'text-blue-600' : 'text-white'}`}>
                                        {isBuilding ? 'Evolving Application...' : 'Pokédex Research & Development'}
                                    </h3>
                                </div>
                                <textarea 
                                    className="w-full p-4 rounded-xl text-sm bg-black/20 text-white placeholder-red-200 border-2 border-red-400 outline-none mb-4 resize-none focus:ring-2 focus:ring-yellow-400"
                                    rows="3"
                                    placeholder="Enter your evolution command... (e.g. Add a health potion tracker)"
                                    value={prompt}
                                    onChange={e => setPrompt(e.target.value)}
                                    disabled={isBuilding}
                                />
                                <button 
                                    onClick={handleAIUpdate} 
                                    disabled={isBuilding || !prompt}
                                    className={`w-full py-4 rounded-xl font-black text-sm text-white shadow-lg active:scale-95 transition-all border-b-4 border-black/30
                                        ${pushStatus === 'success' ? 'bg-green-500' : pushStatus === 'error' ? 'bg-orange-600' : 'bg-blue-600'}
                                        ${(isBuilding || !prompt) ? 'opacity-50 cursor-not-allowed' : ''}
                                    `}
                                >
                                    {isBuilding ? 'TRAINING...' : pushStatus === 'success' ? '✅ EVOLVED' : pushStatus === 'error' ? '❌ FAINTED' : 'UPGRADE POKÉDEX'}
                                </button>
                            </div>
                            
                            {/* ADVENTURE LOG */}
                            <div className="space-y-4 pt-4">
                                <h2 className="text-xs font-black text-blue-800 uppercase tracking-widest px-2 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-yellow-400"></span>
                                    Adventure Log
                                </h2>
                                {logs.length === 0 ? (
                                    <div className="text-center py-12 bg-white rounded-3xl border-4 border-dashed border-blue-200 text-slate-400 italic text-sm">
                                        No Pokémon data recorded yet.<br/>
                                        <span className="text-[10px] opacity-50">Command the Pokédex to start your journey.</span>
                                    </div>
                                ) : (
                                    logs.map(log => (
                                        <div key={log.id} className="bg-white p-5 rounded-3xl border-2 border-blue-100 shadow-sm relative overflow-hidden group">
                                            <div className="absolute top-0 right-0 w-16 h-16 bg-blue-50 -mr-8 -mt-8 rounded-full opacity-0 group-hover:opacity-100 transition-opacity flex items-end justify-start p-4">
                                                ⭐
                                            </div>
                                            <p className="text-sm text-slate-700 leading-relaxed font-medium">{log.content}</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-6 animate-in slide-in-from-left-4 duration-300">
                            {/* PRESERVED ADMIN SECTION */}
                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-black text-slate-900">Builder Config</h2>
                                    {testStatus && <span className="text-[10px] font-bold px-2 py-1 bg-slate-100 rounded-lg">{testStatus}</span>}
                                </div>
                                
                                <label className="text-[10px] font-black uppercase text-slate-500 block mb-2">GitHub Token</label>
                                <input 
                                    type="password" 
                                    className="w-full p-4 bg-slate-50 rounded-2xl text-sm border-none mb-4 outline-none focus:ring-2 focus:ring-blue-100" 
                                    placeholder="ghp_..."
                                    value={ghToken} 
                                    onChange={e => {setGhToken(e.target.value); localStorage.setItem('gh_token', e.target.value)}} 
                                />

                                <button 
                                    onClick={testConnection}
                                    className="w-full py-3 mb-4 rounded-xl text-xs font-black uppercase tracking-widest border-2 border-slate-100 hover:bg-slate-50 transition-colors"
                                >
                                    Test Connection
                                </button>

                                <div className="p-4 bg-slate-900 rounded-2xl text-[10px] font-mono text-blue-400 break-all border border-slate-800">
                                    <p className="text-slate-500 mb-1 uppercase font-black tracking-tighter">Debug Log</p>
                                    {debugInfo || "Builder standing by..."}
                                </div>
                            </div>

                            <div className="bg-slate-50 p-6 rounded-3xl border border-slate-200">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xs font-black uppercase tracking-widest text-slate-400">Commit History</h3>
                                    <button onClick={fetchCommits} className="text-[10px] text-blue-600 font-bold uppercase underline">Refresh</button>
                                </div>
                                <div className="space-y-3">
                                    {commits.length > 0 ? commits.map((c, i) => (
                                        <div key={i} className="flex flex-col border-b border-slate-200 pb-2 last:border-0">
                                            <div className="flex justify-between mb-1">
                                                <span className="text-[10px] font-mono text-blue-600 font-bold bg-blue-50 px-1 rounded">{c.sha.slice(0,7)}</span>
                                                <span className="text-[9px] text-slate-400">{new Date(c.commit.author.date).toLocaleDateString()}</span>
                                            </div>
                                            <p className="text-[11px] text-slate-700 truncate font-medium">{c.commit.message}</p>
                                        </div>
                                    )) : (
                                        <p className="text-[10px] text-slate-400 italic">No commits fetched yet.</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
