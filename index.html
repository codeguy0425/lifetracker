<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeTracker - Green Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-emerald-50 text-emerald-950">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const DAY_ONE = new Date('2026-04-23T00:00:00');
        const STORAGE_KEY = 'greentracker-life-data-v2';

        function App() {
            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : [];
            });
            const [text, setText] = useState("");
            const [category, setCategory] = useState("Note");
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            
            // UI State
            const [viewMode, setViewMode] = useState('timeline'); // 'timeline' or 'calendar'
            const [filterCategory, setFilterCategory] = useState('All');
            const [calendarMonth, setCalendarMonth] = useState(new Date());
            const [inspectDate, setInspectDate] = useState(null);
            
            const fileInputRef = useRef(null);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
            }, [logs]);

            const getDayNumber = (dateString) => {
                const target = new Date(dateString);
                target.setHours(0,0,0,0);
                const diffTime = target - DAY_ONE;
                return Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
            };

            const currentDayNumber = useMemo(() => {
                const today = new Date();
                today.setHours(0,0,0,0);
                return getDayNumber(today.toISOString().split('T')[0]);
            }, []);

            const categories = [
                { name: 'Meal', color: 'bg-lime-500' },
                { name: 'Gym', color: 'bg-emerald-600' },
                { name: 'Hiking', color: 'bg-green-700' },
                { name: 'PTCG', color: 'bg-teal-500' },
                { name: 'Note', color: 'bg-slate-500' }
            ];

            const filteredLogs = useMemo(() => {
                return logs.filter(log => filterCategory === 'All' || log.category === filterCategory);
            }, [logs, filterCategory]);

            const groupedLogs = useMemo(() => {
                const groups = {};
                filteredLogs.forEach(log => {
                    const dateKey = log.isoDate;
                    if (!groups[dateKey]) groups[dateKey] = [];
                    groups[dateKey].push(log);
                });
                return Object.entries(groups).sort((a, b) => new Date(b[0]) - new Date(a[0]));
            }, [filteredLogs]);

            const saveEntry = () => {
                if (!text) return;
                const entryDate = new Date(selectedDate);
                const entry = {
                    id: Date.now(),
                    category,
                    content: text,
                    displayDate: entryDate.toLocaleDateString('en-HK', { day: '2-digit', month: 'short', year: 'numeric' }),
                    isoDate: selectedDate,
                    dayNumber: getDayNumber(selectedDate)
                };
                setLogs([entry, ...logs]);
                setText("");
            };

            const deleteLog = (id) => {
                setLogs(logs.filter(l => l.id !== id));
            };

            const exportData = () => {
                const dataStr = JSON.stringify(logs, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = `lifetracker_backup_${new Date().toISOString().split('T')[0]}.json`;
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };

            const importData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedLogs = JSON.parse(e.target.result);
                        if (Array.isArray(importedLogs)) {
                            setLogs(importedLogs);
                        }
                    } catch (err) { alert("Error reading file."); }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const CalendarView = () => {
                const year = calendarMonth.getFullYear();
                const month = calendarMonth.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay();
                
                const calendarDays = [];
                for (let i = 0; i < firstDay; i++) calendarDays.push(null);
                for (let i = 1; i <= daysInMonth; i++) calendarDays.push(i);

                return (
                    <div className="space-y-4">
                        <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-100">
                            <div className="flex justify-between items-center mb-6 px-2">
                                <button onClick={() => {
                                    const d = new Date(calendarMonth);
                                    d.setMonth(d.getMonth() - 1);
                                    setCalendarMonth(d);
                                }} className="p-2 hover:bg-emerald-50 rounded-full text-emerald-600">◀</button>
                                <span className="font-black text-emerald-800 uppercase tracking-tighter text-lg">
                                    {calendarMonth.toLocaleString('default', { month: 'long', year: 'numeric' })}
                                </span>
                                <button onClick={() => {
                                    const d = new Date(calendarMonth);
                                    d.setMonth(d.getMonth() + 1);
                                    setCalendarMonth(d);
                                }} className="p-2 hover:bg-emerald-50 rounded-full text-emerald-600">▶</button>
                            </div>
                            <div className="grid grid-cols-7 gap-2">
                                {['S', 'M', 'T', 'W', 'T', 'F', 'S'].map(d => (
                                    <div key={d} className="text-[10px] font-black text-center text-emerald-200 py-2">{d}</div>
                                ))}
                                {calendarDays.map((day, idx) => {
                                    const dateStr = day ? `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}` : '';
                                    const dayLogs = logs.filter(l => l.isoDate === dateStr && (filterCategory === 'All' || l.category === filterCategory));
                                    const hasLog = dayLogs.length > 0;
                                    
                                    return (
                                        <button 
                                            key={idx} 
                                            disabled={!day}
                                            onClick={() => setInspectDate(dateStr)}
                                            className={`h-12 flex flex-col items-center justify-center text-sm rounded-2xl relative transition-all 
                                                ${day ? 'hover:bg-emerald-50 active:scale-90 cursor-pointer' : 'opacity-0'} 
                                                ${hasLog ? 'bg-emerald-100/50 text-emerald-800 font-bold border border-emerald-200' : 'text-emerald-300'}
                                            `}
                                        >
                                            {day}
                                            {hasLog && (
                                                <div className="flex gap-0.5 mt-1">
                                                    {dayLogs.slice(0, 3).map(l => (
                                                        <div key={l.id} className={`w-1 h-1 rounded-full ${categories.find(c => c.name === l.category)?.color}`}></div>
                                                    ))}
                                                </div>
                                            )}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {inspectDate && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-emerald-900/40 backdrop-blur-sm animate-in fade-in duration-200" onClick={() => setInspectDate(null)}>
                                <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-6 overflow-hidden max-h-[70vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                    <div className="flex justify-between items-center mb-4">
                                        <h4 className="font-black text-emerald-800 uppercase text-xs tracking-widest">
                                            Logs for {new Date(inspectDate).toLocaleDateString('en-HK', { day: '2-digit', month: 'short' })}
                                        </h4>
                                        <button onClick={() => setInspectDate(null)} className="text-emerald-300 hover:text-emerald-600 font-bold">Close</button>
                                    </div>
                                    <div className="overflow-y-auto space-y-3 pr-2 no-scrollbar">
                                        {logs.filter(l => l.isoDate === inspectDate).map(log => (
                                            <div key={log.id} className="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                                                <span className={`text-[8px] font-black uppercase px-2 py-0.5 rounded text-white ${categories.find(c => c.name === log.category)?.color} mb-2 inline-block`}>
                                                    {log.category}
                                                </span>
                                                <p className="text-sm text-emerald-900 leading-snug">{log.content}</p>
                                            </div>
                                        ))}
                                        {logs.filter(l => l.isoDate === inspectDate).length === 0 && (
                                            <p className="text-center py-10 text-emerald-300 italic text-sm">No data recorded.</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto min-h-screen p-4 flex flex-col gap-6 font-sans">
                    <header className="pt-4">
                        <div className="flex items-center justify-between mb-4">
                            <div>
                                <h1 className="text-2xl font-black text-emerald-600 tracking-tighter uppercase">Sector Log</h1>
                                <p className="text-emerald-400 font-bold text-[10px] tracking-widest uppercase">System: Operational</p>
                            </div>
                            <div className="flex gap-1">
                                {['timeline', 'calendar'].map(mode => (
                                    <button 
                                        key={mode}
                                        onClick={() => setViewMode(mode)}
                                        className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${viewMode === mode ? 'bg-emerald-600 text-white shadow-lg' : 'bg-white text-emerald-400 border border-emerald-100'}`}
                                    >
                                        {mode}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-emerald-600 rounded-[2.5rem] p-6 text-white shadow-2xl shadow-emerald-200 relative overflow-hidden">
                            <div className="relative z-10">
                                <p className="text-xs font-black opacity-70 uppercase tracking-[0.2em] mb-1">Current Cycle</p>
                                <p className="text-5xl font-black mb-1 tabular-nums">
                                    {currentDayNumber > 0 ? `DAY ${currentDayNumber}` : 'INIT...'}
                                </p>
                            </div>
                            <div className="absolute -right-6 -top-6 w-32 h-32 bg-emerald-500 rounded-full blur-2xl opacity-50"></div>
                        </div>
                    </header>

                    <main className="flex-1 space-y-6">
                        {/* Filter Bar */}
                        <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                            {['All', ...categories.map(c => c.name)].map(cat => (
                                <button 
                                    key={cat}
                                    onClick={() => setFilterCategory(cat)}
                                    className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap border-2 ${filterCategory === cat ? 'bg-emerald-100 border-emerald-600 text-emerald-700' : 'bg-white border-transparent text-emerald-300'}`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>

                        {viewMode === 'calendar' ? (
                            <CalendarView />
                        ) : (
                            <>
                                {/* Entry Creator */}
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 space-y-4">
                                    <div className="flex items-center justify-between gap-2">
                                        <div className="flex-1 bg-emerald-50 p-3 rounded-2xl flex items-center justify-between px-4 border border-emerald-100 relative">
                                            <input 
                                                type="date" 
                                                className="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
                                                value={selectedDate}
                                                onChange={(e) => setSelectedDate(e.target.value)}
                                            />
                                            <div className="text-left pointer-events-none">
                                                <p className="text-[10px] font-black text-emerald-300 uppercase tracking-tighter">Event Date</p>
                                                <p className="text-sm font-black text-emerald-700">
                                                    {new Date(selectedDate).toLocaleDateString('en-HK', { day: '2-digit', month: 'short' })}
                                                </p>
                                            </div>
                                            <div className="w-8 h-8 bg-white rounded-xl flex items-center justify-center shadow-sm text-emerald-500 pointer-events-none text-xs">📅</div>
                                        </div>
                                        <div className="flex-1 bg-emerald-50 p-3 rounded-2xl px-4 border border-emerald-100">
                                            <p className="text-[10px] font-black text-emerald-300 uppercase tracking-tighter">Timeline</p>
                                            <p className="text-sm font-black text-emerald-700">Day {getDayNumber(selectedDate)}</p>
                                        </div>
                                    </div>

                                    <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                                        {categories.map(cat => (
                                            <button 
                                                key={cat.name} 
                                                onClick={() => setCategory(cat.name)}
                                                className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${category === cat.name ? `${cat.color} text-white shadow-lg scale-105` : 'bg-emerald-50 text-emerald-400'}`}
                                            >
                                                {cat.name}
                                            </button>
                                        ))}
                                    </div>

                                    <textarea 
                                        className="w-full p-4 bg-emerald-50/50 border-2 border-emerald-50 rounded-2xl focus:border-emerald-200 outline-none text-emerald-900 placeholder:text-emerald-200 resize-none text-sm font-medium"
                                        placeholder="Add to logs..."
                                        rows="2"
                                        value={text}
                                        onChange={(e) => setText(e.target.value)}
                                    />

                                    <button 
                                        onClick={saveEntry}
                                        className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-[0.2em] hover:bg-emerald-700 active:scale-95 transition-all shadow-xl shadow-emerald-100"
                                    >
                                        Transmit Log
                                    </button>
                                </div>

                                {/* Grouped Timeline */}
                                <div className="space-y-10 pb-10">
                                    {groupedLogs.length === 0 && (
                                        <div className="text-center py-20 opacity-20">
                                            <div className="text-6xl mb-4">👽</div>
                                            <p className="font-black uppercase tracking-widest text-xs">No matching logs</p>
                                        </div>
                                    )}
                                    
                                    {groupedLogs.map(([dateKey, entries]) => (
                                        <section key={dateKey} className="relative">
                                            <div className="sticky top-4 z-20 mb-4">
                                                <div className="inline-flex items-center gap-3 bg-emerald-900 text-white px-4 py-2 rounded-full shadow-lg border-2 border-emerald-400">
                                                    <span className="text-[10px] font-black uppercase tracking-tighter">
                                                        {new Date(dateKey).toLocaleDateString('en-HK', { day: '2-digit', month: 'short', year: 'numeric' })}
                                                    </span>
                                                    <div className="w-px h-3 bg-emerald-500/50"></div>
                                                    <span className="text-[10px] font-black">DAY {entries[0].dayNumber}</span>
                                                </div>
                                            </div>

                                            <div className="space-y-3 ml-4 border-l-2 border-emerald-100 pl-6 py-2">
                                                {entries.map(log => (
                                                    <div key={log.id} className="bg-white p-5 rounded-3xl shadow-sm border border-emerald-50 relative group hover:border-emerald-200 transition-colors">
                                                        <div className="flex justify-between items-center mb-3">
                                                            <span className={`text-[8px] font-black uppercase px-2 py-1 rounded-lg text-white tracking-widest ${categories.find(c => c.name === log.category)?.color}`}>
                                                                {log.category}
                                                            </span>
                                                            <button 
                                                                onClick={() => deleteLog(log.id)} 
                                                                className="text-emerald-100 hover:text-red-400 transition-colors"
                                                            >
                                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                                            </button>
                                                        </div>
                                                        <p className="text-emerald-900 text-sm leading-relaxed font-medium">{log.content}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    ))}
                                </div>
                            </>
                        )}

                        {/* Data Control */}
                        <div className="pt-4 pb-20 border-t border-emerald-100 flex gap-4">
                            <input type="file" accept=".json" className="hidden" ref={fileInputRef} onChange={importData} />
                            <button onClick={() => fileInputRef.current.click()} className="flex-1 bg-white border border-emerald-200 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest text-emerald-600 hover:bg-emerald-50">Import JSON</button>
                            <button onClick={exportData} className="flex-1 bg-white border border-emerald-200 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest text-emerald-600 hover:bg-emerald-50">Export Backup</button>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
